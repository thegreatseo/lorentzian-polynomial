name: Lean Documentation

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Lean and build
        uses: leanprover/lean-action@v1
        with:
          build: true

      - name: Generate and deploy documentation
        uses: leanprover-community/docgen-action@v1
